<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎂 Birthday Card - Rin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(145deg, #fce4ec 0%, #f8bbd0 100%);
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            padding: 1.5rem;
            overflow-x: hidden;
        }

        .card-container {
            max-width: 720px;
            width: 100%;
            perspective: 1800px;
        }

        .card {
            position: relative;
            width: 100%;
            min-height: 580px;
            background: #fff5f7;
            border-radius: 48px;
            box-shadow: 0 30px 50px rgba(180, 60, 100, 0.25);
            border: 3px solid #f48fb1;
            transition: transform 0.6s ease, box-shadow 0.4s ease;
            transform-style: preserve-3d;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(244, 143, 177, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 90% 80%, rgba(244, 143, 177, 0.08) 0%, transparent 50%),
                repeating-linear-gradient(45deg, transparent, transparent 20px, rgba(244, 143, 177, 0.05) 20px, rgba(244, 143, 177, 0.05) 21px),
                repeating-linear-gradient(-45deg, transparent, transparent 20px, rgba(244, 143, 177, 0.05) 20px, rgba(244, 143, 177, 0.05) 21px);
            background-blend-mode: overlay;
            cursor: pointer;
        }

        .card:hover {
            box-shadow: 0 40px 60px rgba(180, 60, 100, 0.3);
        }

        .card.open {
            transform: rotateY(180deg);
        }

        .card-inner {
            position: relative;
            width: 100%;
            min-height: 580px;
            transform-style: preserve-3d;
            transition: transform 0.6s ease;
        }

        .card-front {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            border-radius: 48px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2.2rem 2rem;
            background: #fff5f7;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(244, 143, 177, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 90% 80%, rgba(244, 143, 177, 0.08) 0%, transparent 50%),
                repeating-linear-gradient(45deg, transparent, transparent 20px, rgba(244, 143, 177, 0.05) 20px, rgba(244, 143, 177, 0.05) 21px),
                repeating-linear-gradient(-45deg, transparent, transparent 20px, rgba(244, 143, 177, 0.05) 20px, rgba(244, 143, 177, 0.05) 21px);
            background-blend-mode: overlay;
            border-radius: 48px;
            border: 3px solid #f48fb1;
            box-shadow: inset 0 0 40px rgba(244, 143, 177, 0.08);
            cursor: pointer;
            z-index: 2;
        }

        .card-back {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            border-radius: 48px;
            transform: rotateY(180deg);
            background: #fff5f7;
            padding: 2.2rem 2rem 2.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            border: 3px solid #f48fb1;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(244, 143, 177, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 90% 80%, rgba(244, 143, 177, 0.08) 0%, transparent 50%),
                repeating-linear-gradient(45deg, transparent, transparent 20px, rgba(244, 143, 177, 0.05) 20px, rgba(244, 143, 177, 0.05) 21px),
                repeating-linear-gradient(-45deg, transparent, transparent 20px, rgba(244, 143, 177, 0.05) 20px, rgba(244, 143, 177, 0.05) 21px);
            background-blend-mode: overlay;
            overflow-y: auto;
            cursor: default;
        }

        .envelope-icon {
            font-size: 6rem;
            line-height: 1;
            margin-bottom: 0.8rem;
            animation: float 3s ease-in-out infinite;
            filter: drop-shadow(0 8px 20px rgba(180, 60, 100, 0.15));
            pointer-events: none;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(-2deg); }
            50% { transform: translateY(-12px) rotate(2deg); }
        }

        .envelope-title {
            font-size: 2.6rem;
            font-weight: 700;
            color: #880e4f;
            letter-spacing: 2px;
            text-shadow: 0 4px 12px rgba(136, 14, 79, 0.1);
            margin-bottom: 0.4rem;
            pointer-events: none;
        }

        .envelope-sub {
            font-size: 1.3rem;
            color: #ad1457;
            font-weight: 500;
            opacity: 0.8;
            letter-spacing: 3px;
            border-top: 2px dashed #f06292;
            padding-top: 0.8rem;
            margin-top: 0.4rem;
            pointer-events: none;
        }

        .envelope-decoration {
            margin-top: 1.2rem;
            font-size: 2.2rem;
            letter-spacing: 8px;
            opacity: 0.6;
            pointer-events: none;
        }

        .click-hint {
            margin-top: 1.8rem;
            font-size: 1rem;
            color: #880e4f;
            background: #fce4ec;
            padding: 0.5rem 1.8rem;
            border-radius: 60px;
            border: 1px solid #f48fb1;
            font-weight: 500;
            animation: pulse 2s ease-in-out infinite;
            opacity: 0.8;
            pointer-events: none;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.7; }
            50% { transform: scale(1.05); opacity: 1; }
        }

        .card-back .photo-section {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-bottom: 0.6rem;
        }

        .card-back .photo-frame {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: #fce4ec;
            border: 4px solid #f48fb1;
            box-shadow: 0 8px 20px rgba(180, 60, 100, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            position: relative;
        }

        .card-back .photo-frame:hover {
            transform: scale(1.04);
            box-shadow: 0 12px 28px rgba(180, 60, 100, 0.3);
        }

        .card-back .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .card-back .photo-placeholder {
            font-size: 3.5rem;
            line-height: 1;
            color: #d81b60;
            font-weight: 300;
            letter-spacing: 2px;
            opacity: 0.7;
            user-select: none;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            background: #fce4ec;
        }

        .card-back .photo-placeholder span {
            font-size: 1.8rem;
            background: #f06292;
            color: #fff;
            padding: 0.3rem 0.9rem;
            border-radius: 60px;
            font-weight: 600;
            opacity: 0.9;
        }

        .icon-birthday {
            font-size: 4.2rem;
            line-height: 1.2;
            margin-bottom: 0.2rem;
            filter: drop-shadow(0 6px 12px rgba(180, 60, 100, 0.12));
        }

        .card-back h1 {
            font-size: 2.6rem;
            font-weight: 700;
            letter-spacing: 1px;
            color: #880e4f;
            margin-top: 0.2rem;
            margin-bottom: 0.2rem;
            text-shadow: 0 4px 12px rgba(136, 14, 79, 0.12);
            word-break: break-word;
        }

        .name-recipient {
            background: linear-gradient(135deg, #d81b60, #ad1457);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .wish-message {
            font-size: 1.25rem;
            line-height: 1.7;
            color: #4a1a2c;
            background: #fce4ec;
            padding: 1rem 1.6rem;
            border-radius: 60px 20px 60px 20px;
            margin: 0.6rem 0 1rem;
            box-shadow: inset 0 2px 8px rgba(244, 143, 177, 0.3), 0 8px 18px rgba(180, 60, 100, 0.08);
            border: 1px solid #f8bbd0;
            width: 100%;
            font-weight: 500;
        }

        .extra-love {
            font-size: 1rem;
            color: #4a1a2c;
            background: #fce4ec;
            padding: 0.7rem 1.4rem;
            border-radius: 100px;
            display: inline-block;
            margin-bottom: 1.4rem;
            border: 2px dashed #f06292;
            box-shadow: 0 4px 8px rgba(180, 60, 100, 0.04);
            font-style: italic;
            font-weight: 500;
        }

        .action-area {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.6rem 1rem;
            margin: 0.4rem 0 0.6rem;
            width: 100%;
        }

        .btn {
            background: #f8bbd0;
            border: none;
            padding: 0.7rem 1.6rem;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 600;
            color: #4a1a2c;
            box-shadow: 0 5px 0 #d81b60, 0 8px 18px rgba(180, 60, 100, 0.2);
            cursor: pointer;
            transition: all 0.08s linear;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: 1px solid #f48fb1;
            letter-spacing: 0.3px;
            position: relative;
            z-index: 10;
        }

        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #ad1457, 0 6px 14px rgba(180, 60, 100, 0.15);
        }

        .btn-happy {
            background: #f06292;
            color: #fff;
            box-shadow: 0 5px 0 #ad1457, 0 8px 18px rgba(180, 60, 100, 0.25);
            border-color: #ec407a;
        }

        .footer-note {
            margin-top: 1.4rem;
            font-size: 0.9rem;
            color: #6d2a46;
            border-top: 2px dotted #f48fb1;
            padding-top: 1rem;
            width: 100%;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.3rem 0.8rem;
            letter-spacing: 0.3px;
        }

        .footer-note span {
            background: #fce4ec;
            padding: 0.2rem 0.9rem;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.85rem;
            box-shadow: inset 0 1px 4px rgba(255, 255, 255, 0.6);
        }

        .deco-emoji {
            font-size: 1.4rem;
            line-height: 1;
            margin: 0 0.2rem;
        }

        .confetti-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
            overflow: hidden;
        }

        .confetti-piece {
            position: absolute;
            width: 10px;
            height: 10px;
            opacity: 0;
            animation: confettiFall linear forwards;
        }

        @keyframes confettiFall {
            0% { transform: translateY(-20px) rotate(0deg) scale(0); opacity: 0; }
            10% { opacity: 1; transform: translateY(10px) rotate(20deg) scale(0.8); }
            100% { transform: translateY(110vh) rotate(720deg) scale(1); opacity: 0.7; }
        }

        .music-control {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 245, 247, 0.95);
            backdrop-filter: blur(10px);
            padding: 0.7rem 1.2rem;
            border-radius: 60px;
            box-shadow: 0 8px 30px rgba(180, 60, 100, 0.2);
            border: 2px solid #f48fb1;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 100;
            font-size: 0.9rem;
            color: #880e4f;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .music-control:hover {
            transform: scale(1.05);
        }

        .music-control .music-icon {
            font-size: 1.5rem;
        }

        .music-control .music-label {
            font-weight: 600;
            font-size: 0.85rem;
        }

        .music-control .music-toggle {
            background: #f06292;
            color: #fff;
            border: none;
            padding: 0.3rem 0.9rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.75rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .music-control .music-toggle:hover {
            background: #d81b60;
        }

        @media (max-width: 500px) {
            .card, .card-front, .card-back { min-height: 480px; border-radius: 36px; }
            .card-front, .card-back { padding: 1.5rem 1rem; }
            .envelope-title { font-size: 2rem; }
            .envelope-icon { font-size: 4.5rem; }
            .card-back h1 { font-size: 2rem; }
            .wish-message { font-size: 1rem; padding: 0.8rem 1rem; }
            .btn { font-size: 0.9rem; padding: 0.6rem 1.2rem; }
            .card-back .photo-frame { width: 100px; height: 100px; }
            .icon-birthday { font-size: 3.4rem; }
            .music-control { padding: 0.5rem 1rem; font-size: 0.8rem; bottom: 12px; right: 12px; }
            .music-control .music-icon { font-size: 1.2rem; }
        }

        @media (max-width: 400px) {
            .card, .card-front, .card-back { min-height: 420px; padding: 1rem 0.8rem; }
            .card-back h1 { font-size: 1.6rem; }
            .extra-love { font-size: 0.85rem; padding: 0.4rem 0.8rem; }
            .card-back .photo-frame { width: 80px; height: 80px; }
            .envelope-title { font-size: 1.6rem; }
            .envelope-icon { font-size: 3.8rem; }
        }
    </style>
</head>
<body>

    <div class="card-container">
        <div class="card" id="birthdayCard">
            <div class="card-inner">

                <div class="card-front" id="cardFront">
                    <div class="envelope-icon">💌</div>
                    <div class="envelope-title">Open Me!</div>
                    <div class="envelope-sub">✨ A Special Surprise Awaits ✨</div>
                    <div class="envelope-decoration">🌸 ✉️ 🌸</div>
                    <div class="click-hint">👆 Click to open</div>
                </div>

                <div class="card-back" id="cardBack">

                    <div class="photo-section">
                        <div class="photo-frame" id="photoFrame">
                            <div class="photo-placeholder" id="photoPlaceholder">
                                <span>📸</span>
                            </div>
                            <img id="profileImage" src="" alt="Rin" style="display: none;">
                        </div>
                    </div>

                    <div class="icon-birthday" aria-hidden="true">🎂</div>

                    <h1>
                        <span class="deco-emoji">🌸</span>
                        Happy Birthday,
                        <span class="name-recipient" id="nameRecipient">Rin</span>
                        <span class="deco-emoji">🌸</span>
                    </h1>

                    <div class="wish-message" id="wishMessage">
                        May every moment be filled with joy, love, and success!
                    </div>

                    <div class="extra-love" id="extraLove">
                        May this year bring a thousand smiles and make all your dreams come true.
                    </div>

                    <div class="action-area">
                        <button class="btn btn-happy" id="btnWish">🎁 Wish More</button>
                        <button class="btn" id="btnSurprise">🎈 Surprise!</button>
                    </div>

                    <div class="footer-note">
                        <span>📅 July 7, 2026</span>
                        <span>💌 From: <strong>Me & My Family</strong></span>
                        <span>🎵 <span id="emojiSong">🎶</span></span>
                    </div>

                </div>

            </div>
        </div>
    </div>

    <div class="confetti-container" id="confettiContainer"></div>

    <div class="music-control" id="musicControl">
        <span class="music-icon" id="musicIcon">🎵</span>
        <span class="music-label" id="musicLabel">🎵 Beautiful - Bazzi</span>
        <button class="music-toggle" id="musicToggle">🔊 Play</button>
    </div>

    <!-- ============================================ -->
    <!-- 📍 LAGU - guna relative path (sama folder) -->
    <!-- ============================================ -->
    <audio id="birthdayAudio" preload="auto">
        <source src="Beautiful.mp3.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <script>
        (function() {
            "use strict";

            const confettiContainer = document.getElementById('confettiContainer');
            let confettiActive = false;

            function createConfetti() {
                const colors = ['#f06292', '#ec407a', '#f48fb1', '#f8bbd0', '#d81b60', '#ff80ab', '#ff4081', '#e91e63',
                    '#ff6f00', '#ffab00', '#ffd600', '#76ff03', '#00e5ff', '#2979ff', '#d500f9', '#ff3d00'
                ];
                const shapes = ['●', '■', '▲', '★', '♥', '✦', '♦', '⬥'];

                for (let i = 0; i < 80; i++) {
                    const piece = document.createElement('div');
                    piece.className = 'confetti-piece';
                    piece.textContent = shapes[Math.floor(Math.random() * shapes.length)];
                    piece.style.color = colors[Math.floor(Math.random() * colors.length)];
                    piece.style.fontSize = (Math.random() * 16 + 8) + 'px';
                    piece.style.left = (Math.random() * 100) + '%';
                    piece.style.top = '-10px';
                    piece.style.animationDuration = (Math.random() * 2 + 2) + 's';
                    piece.style.animationDelay = (Math.random() * 2) + 's';
                    piece.style.transform = 'rotate(' + (Math.random() * 360) + 'deg)';
                    piece.style.opacity = '0';
                    confettiContainer.appendChild(piece);
                }
            }

            function triggerConfetti() {
                if (confettiActive) return;
                confettiActive = true;
                confettiContainer.innerHTML = '';
                createConfetti();

                setTimeout(() => {
                    confettiContainer.innerHTML = '';
                    confettiActive = false;
                }, 4500);
            }

            const audio = document.getElementById('birthdayAudio');
            const musicToggle = document.getElementById('musicToggle');
            const musicIcon = document.getElementById('musicIcon');
            let isPlaying = false;

            function toggleAudio() {
                if (isPlaying) {
                    audio.pause();
                    isPlaying = false;
                    musicToggle.textContent = '🔊 Play';
                    musicIcon.textContent = '🎵';
                } else {
                    audio.play().catch(function(error) {
                        console.log('Audio play failed:', error);
                        musicToggle.textContent = '⚠️ Click';
                        setTimeout(() => {
                            musicToggle.textContent = '🔊 Play';
                        }, 2000);
                    });
                    isPlaying = true;
                    musicToggle.textContent = '🔇 Pause';
                    musicIcon.textContent = '🎶';
                }
            }

            musicToggle.addEventListener('click', function(e) {
                e.stopPropagation();
                toggleAudio();
            });

            document.getElementById('musicControl').addEventListener('click', function(e) {
                if (e.target.closest('.music-toggle')) return;
                toggleAudio();
            });

            const card = document.getElementById('birthdayCard');
            const cardFront = document.getElementById('cardFront');
            let isOpen = false;
            let hasPlayed = false;
            let confettiTriggered = false;

            function openCard() {
                if (!isOpen) {
                    isOpen = true;
                    card.classList.add('open');

                    if (!confettiTriggered) {
                        setTimeout(() => {
                            triggerConfetti();
                            setTimeout(() => {
                                triggerConfetti();
                            }, 1200);
                        }, 400);
                        confettiTriggered = true;
                    }

                    if (!isPlaying && !hasPlayed) {
                        audio.play().catch(function(error) {
                            console.log('Auto-play blocked. User must click play button.');
                        });
                        isPlaying = true;
                        hasPlayed = true;
                        musicToggle.textContent = '🔇 Pause';
                        musicIcon.textContent = '🎶';
                    }
                }
            }

            function closeCard() {
                if (isOpen) {
                    isOpen = false;
                    card.classList.remove('open');
                }
            }

            function toggleCard() {
                if (isOpen) {
                    closeCard();
                } else {
                    openCard();
                }
            }

            cardFront.addEventListener('click', function(e) {
                openCard();
            });

            card.addEventListener('click', function(e) {
                if (e.target.closest('.btn')) return;
                if (e.target.closest('#photoFrame')) return;
                if (e.target.closest('.music-control')) return;

                const cardBack = document.getElementById('cardBack');
                if (cardBack.contains(e.target)) {
                    toggleCard();
                } else {
                    openCard();
                }
            });

            // ============================================
            // 📍 GAMBAR - guna relative path (sama folder)
            // ============================================
            const photoFrame = document.getElementById('photoFrame');
            const profileImg = document.getElementById('profileImage');
            const placeholder = document.getElementById('photoPlaceholder');

            function setDefaultPhoto() {
                // Cuba macam ni dulu
                const imageUrl = 'rin.jpg.jpg';

                const img = new Image();
                img.src = imageUrl;
                img.onload = function() {
                    profileImg.src = imageUrl;
                    profileImg.style.display = 'block';
                    placeholder.style.display = 'none';
                    profileImg.alt = 'Rin';
                    console.log('✅ Gambar berjaya: ' + imageUrl);
                };
                img.onerror = function() {
                    // Kalau tak jadi, cuba format lain
                    const fallbackUrls = ['rin.JPG', 'rin.jpeg', 'rin.png'];
                    let tried = 0;
                    
                    function tryNext() {
                        if (tried >= fallbackUrls.length) {
                            profileImg.style.display = 'none';
                            placeholder.style.display = 'flex';
                            placeholder.innerHTML = '<span>🌸</span>';
                            console.warn('❌ Semua format gambar gagal. Cuba check nama file.');
                            return;
                        }
                        const fallbackImg = new Image();
                        fallbackImg.src = fallbackUrls[tried];
                        fallbackImg.onload = function() {
                            profileImg.src = fallbackUrls[tried];
                            profileImg.style.display = 'block';
                            placeholder.style.display = 'none';
                            profileImg.alt = 'Rin';
                            console.log('✅ Gambar berjaya dengan format: ' + fallbackUrls[tried]);
                        };
                        fallbackImg.onerror = function() {
                            tried++;
                            tryNext();
                        };
                    }
                    tryNext();
                };
            }

            setDefaultPhoto();

            photoFrame.addEventListener('click', function(e) {
                e.stopPropagation();
                const newSeed = Math.floor(Math.random() * 1000);
                const newUrl = `https://picsum.photos/seed/${newSeed}/200/200`;
                const img = new Image();
                img.crossOrigin = 'anonymous';
                img.src = newUrl;
                img.onload = function() {
                    profileImg.src = newUrl;
                    profileImg.style.display = 'block';
                    placeholder.style.display = 'none';
                    profileImg.alt = 'Rin';
                    photoFrame.style.transition = 'transform 0.15s';
                    photoFrame.style.transform = 'scale(0.92)';
                    setTimeout(() => photoFrame.style.transform = 'scale(1)', 150);
                };
                img.onerror = function() {
                    profileImg.style.display = 'none';
                    placeholder.style.display = 'flex';
                    placeholder.innerHTML = '<span>🌸</span>';
                };
            });

            const wishList = [
                "May all your dreams come true on this special day and always.",
                "Today is a celebration of you. May it be filled with warmth and happiness.",
                "Wishing you a year ahead full of beautiful moments and endless joy.",
                "May your heart be light and your spirit shine bright today and forever.",
                "Sending you the warmest wishes for health, love, and every success.",
                "Another year, another beautiful chapter. May it be your best one yet.",
                "You make the world a better place. Have a truly wonderful day."
            ];

            const surpriseList = [
                "A warm hug from the whole world is sent your way today.",
                "Stars are falling to celebrate you and your beautiful soul.",
                "May the sweetness of life fill every moment of your special day.",
                "A happy dance is playing just for you. Let your heart groove.",
                "Flowers bloom because of your smile. Keep shining.",
                "A rainbow of joy is painted just for you on this day.",
                "You are loved more than you know. Enjoy every second."
            ];

            const btnWish = document.getElementById('btnWish');
            const btnSurprise = document.getElementById('btnSurprise');
            const wishMsg = document.getElementById('wishMessage');
            const extraLove = document.getElementById('extraLove');
            const emojiSong = document.getElementById('emojiSong');
            const nameSpan = document.getElementById('nameRecipient');

            if (nameSpan.textContent) {
                nameSpan.dataset.originalName = nameSpan.textContent;
            }

            function changeWish() {
                const randomIndex = Math.floor(Math.random() * wishList.length);
                wishMsg.textContent = wishList[randomIndex];
                wishMsg.style.transition = 'transform 0.1s';
                wishMsg.style.transform = 'scale(0.96)';
                setTimeout(() => {
                    wishMsg.style.transform = 'scale(1)';
                }, 100);
                if (nameSpan.dataset.originalName) {
                    nameSpan.textContent = nameSpan.dataset.originalName;
                }
                triggerConfetti();
            }

            function doSurprise() {
                const randomIdx = Math.floor(Math.random() * surpriseList.length);
                extraLove.textContent = surpriseList[randomIdx];

                const songEmojis = ['🎶', '🎵', '🎼', '🎧', '🎤', '🎹', '🥁', '🎸', '🎺', '🎻', '🎷', '🎙️'];
                const randomEmoji = songEmojis[Math.floor(Math.random() * songEmojis.length)];
                emojiSong.textContent = randomEmoji;

                extraLove.style.transition = 'background 0.2s, transform 0.15s';
                extraLove.style.background = '#f8bbd0';
                extraLove.style.transform = 'scale(0.98)';
                setTimeout(() => {
                    extraLove.style.background = '#fce4ec';
                    extraLove.style.transform = 'scale(1)';
                }, 180);

                if (nameSpan.dataset.originalName) {
                    nameSpan.textContent = nameSpan.dataset.originalName;
                }
                triggerConfetti();
                setTimeout(() => triggerConfetti(), 800);
            }

            btnWish.addEventListener('click', function(e) {
                e.stopPropagation();
                changeWish();
                btnWish.style.transform = 'scale(0.92)';
                setTimeout(() => btnWish.style.transform = 'scale(1)', 100);
            });

            btnSurprise.addEventListener('click', function(e) {
                e.stopPropagation();
                doSurprise();
                btnSurprise.style.transform = 'scale(0.92)';
                setTimeout(() => btnSurprise.style.transform = 'scale(1)', 100);
            });

            const initialWish = wishList[Math.floor(Math.random() * wishList.length)];
            wishMsg.textContent = initialWish;

            const extraDefaults = [
                "May this year bring a thousand smiles and make all your dreams come true.",
                "A magical birthday to you. May everything you wish for come true.",
                "Keep spreading kindness and light wherever you go.",
                "The best is yet to come. Enjoy every moment."
            ];
            extraLove.textContent = extraDefaults[Math.floor(Math.random() * extraDefaults.length)];

            console.log('🎂 Birthday Card ready!');
            console.log('📸 Gambar: rin.jpg (cuba format lain jika gagal)');
            console.log('🎵 Lagu: Beautiful.mp3');
        })();
    </script>
